server {
    listen 80;
    listen [::]:80;
    server_name headless.dev.dm3dtech.com;

    root /var/www/html/dm3dtech/frontend/dist;
    index index.html;

    location /graphql {
        proxy_pass http://dev.dm3dtech.com/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host dev.dm3dtech.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
        proxy_pass http://dev.dm3dtech.com/media/;
        proxy_http_version 1.1;
        proxy_set_header Host dev.dm3dtech.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
